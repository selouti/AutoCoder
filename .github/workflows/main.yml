name: say_hello
on: 
  issues:
    types: [opened, reopened, labeled]
jobs:
  job_name: 
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v6
      - name: echo
        run: echo "Hello, world"
      - name: logs
     # number, title, body, assignees, and labels 
        run: |
            echo "Issue Number: ${ISSUE_NUMBER}"
            echo "Issue Title: ${ISSUE_TITLE}"
            echo "Issue Body: ${ISSUE_BODY}"
            echo "Issue Assignees: ${ISSUE_ASSIGNEES}"
            echo "Issue Labels: ${ISSUE_LABELS}"
        env:
            ISSUE_NUMBER: ${{ github.event.issue.number }}
            ISSUE_TITLE: ${{ github.event.issue.title }}
            ISSUE_BODY: ${{ github.event.issue.body }}
            ISSUE_ASSIGNEES: ${{ join(github.event.issue.assignees.*.login, ', ') }}
            ISSUE_LABELS: ${{ join(github.event.issue.labels.*.name, ', ') }}
            
      - name: Generate Code with ChatGPT
        if: ${{ github.event.label.name == 'autocoder-bot'}}
        id: generate_code
        env:
            GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
            REPOSITORY: ${{github.repository}}
            ISSUE_NUMBER: ${{ github.event.issue.number }}
            OPENAI_API_KEY: ${{secrets.OPENAI_API_KEY}}
        run:
            chmod +x scripts/script.sh
            mkdir autocoder-artifact
            scripts/script.sh ${GITHUB_TOKEN} ${REPOSITORY} ${ISSUE_NUMBER} ${OPENAI_API_KEY} >   autocoder-artifact/autocoder-artifact
            
      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: autocoder-artifact
          path: scripts/autocoder-artifact
          if-no-files-found: warn
          retention-days: 3
          compression-level : 6 
          overwrite: true
          include-hidden-files: false
          archive: true

      - name: Download Artifact
        uses: actions/download-artifact@v8
        with:
          name: autocoder-artifact
          path: autocoder-artifact/autocoder-artifact
          
      - name: Display Generated Code using the ls command
        run: ls 
